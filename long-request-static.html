<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Long Request</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./common.js" defer></script>
    <script defer>
      harness.bindLifecycleLogs();
      harness.writeLine("Long-request static scenario initialized");

      window.addEventListener("load", function () {
        harness.writeLine("Scheduling one large payload fetch for 300 ms after load");

        setTimeout(function () {
          const url = harness.cacheBusted("./payload-large.txt", "long-request");
          harness.timedFetch("long-request", url);
        }, 300);
      });
    </script>
  </head>
  <body>
    <main>
      <h1>Long Request</h1>
      <p class="hint">
        A delayed fetch starts after load and downloads a larger payload to make
        the request more visible on slower networks.
      </p>

      <section class="card">
        <h2>Expected</h2>
        <p>
          This is an approximation for GitHub Pages. It is less deterministic
          than the internal server-based version, but still useful for smoke
          validation.
        </p>
      </section>

      <section class="card">
        <h2>Timeline</h2>
        <pre id="timeline" class="timeline"></pre>
      </section>
    </main>
  </body>
</html>
