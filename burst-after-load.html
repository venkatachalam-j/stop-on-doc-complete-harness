<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Burst After Load</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./common.js" defer></script>
    <script defer>
      harness.bindLifecycleLogs();
      harness.writeLine("Burst-after-load scenario initialized");

      window.addEventListener("load", function () {
        [
          {
            label: "burst-1",
            startAfterMs: 250,
            path: "./payload-small.txt",
          },
          {
            label: "burst-2",
            startAfterMs: 750,
            path: "./payload-medium.txt",
          },
          {
            label: "burst-3",
            startAfterMs: 1250,
            path: "./payload-large.txt",
          },
        ].forEach(function (request) {
          harness.writeLine(
            `Scheduling ${request.label} for ${request.startAfterMs} ms after load`
          );

          setTimeout(function () {
            const url = harness.cacheBusted(request.path, request.label);
            harness.timedFetch(request.label, url);
          }, request.startAfterMs);
        });
      });
    </script>
  </head>
  <body>
    <main>
      <h1>Burst After Load</h1>
      <p class="hint">
        Three delayed requests start after load and are spread across the
        current post-load pause window.
      </p>

      <section class="card">
        <h2>Expected</h2>
        <p>
          This page is the clearest proof for the story: off should show late
          activity, on should cut off most or all of it.
        </p>
      </section>

      <section class="card">
        <h2>Timeline</h2>
        <pre id="timeline" class="timeline"></pre>
      </section>
    </main>
  </body>
</html>
